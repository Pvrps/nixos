name: Update Nix Flake Inputs

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github@purps.ca"

      - name: Update flake.lock
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run nixpkgs#nixVersions.latest -- flake update --commit-lock-file

      - name: Verify flake
        run: nix flake check

      - name: Dry Build System
        run: nix build .#nixosConfigurations.desktop.config.system.build.toplevel --dry-run

      - name: Push changes
        run: git push
